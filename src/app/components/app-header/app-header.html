<header
  class="th-border flex flex-shrink-0 items-center justify-between gap-3 border-b-2 px-4 py-3"
  style="background: var(--surface)"
  data-testid="app-header"
>
  <div class="flex items-center gap-3">
    <a
      routerLink="/"
      class="h-8 w-8 flex-shrink-0"
      data-testid="app-header-logo"
      aria-label="Honcho · home"
    >
      <img
        src="honcho-logo.svg"
        alt="Honcho Logo"
        class="h-full w-full object-cover"
        style="border-radius: var(--radius)"
      />
    </a>
    <div>
      <h1 class="th-display text-xl font-bold tracking-widest" style="color: var(--accent)">
        HONCHO INSPECTOR
      </h1>
      <div class="text-[10px] opacity-70" style="color: var(--text-dim)">
        @if (profile(); as p) {
          profile
          <span style="color: var(--accent)">{{ p.label }}</span>
          ·
          <span style="color: var(--accent)">{{ p.workspaceId }}</span>
        }
        · user
        <span style="color: var(--accent)">{{ userName() }}</span>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <select
      (change)="switchProfile($any($event.target).value)"
      data-testid="profile-switcher"
      class="th-border border-2 px-2 py-1 text-xs font-bold uppercase tracking-widest outline-none"
      style="border-radius: var(--radius); background: var(--surface); color: var(--accent)"
      [value]="profile()?.id ?? ''"
      [attr.aria-label]="'Switch active Honcho profile'"
    >
      @for (p of profiles(); track p.id) {
        <option [value]="p.id">{{ p.label }}</option>
      }
    </select>

    @for (link of navLinks(); track link.path) {
      <a
        [routerLink]="link.path"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        routerLinkActive="is-active"
        [attr.data-testid]="link.testid"
        class="th-border app-header-link border-2 px-3 py-1 text-xs font-bold uppercase tracking-widest"
        style="border-radius: var(--radius)"
        >{{ link.label }}</a
      >
    }

    <app-theme-picker />

    <button
      type="button"
      (click)="logout()"
      data-testid="logout-button"
      class="th-border border-2 px-3 py-1 text-xs font-bold uppercase tracking-widest"
      style="border-radius: var(--radius); background: var(--surface); color: var(--text)"
    >
      Logout
    </button>
  </div>
</header>
