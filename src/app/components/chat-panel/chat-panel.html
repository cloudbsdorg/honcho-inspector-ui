<div class="flex h-full min-h-0 flex-col" data-testid="chat-panel">
  <div
    #scrollContainer
    class="th-border min-h-0 flex-1 space-y-3 overflow-y-auto border-2 p-3"
    style="border-radius: var(--radius); background: var(--bg-2)"
  >
    @if (turns().length === 0) {
      <div class="text-center text-sm opacity-60" style="color: var(--text-dim)">
        <p class="th-display text-lg" style="color: var(--accent)">&gt; chat with {{ peerId }}</p>
        <p class="mt-2 text-xs">
          Ask anything. Honcho will use {{ peerId }}'s accumulated memory to reason about the
          answer.
        </p>
      </div>
    }
    @for (turn of turns(); track turn.ts) {
      <div
        class="flex"
        [class.justify-end]="turn.role === 'user'"
        [class.justify-start]="turn.role === 'assistant'"
      >
        <div
          class="th-border max-w-[80%] border-2 px-3 py-2 text-sm"
          style="border-radius: var(--radius)"
          [style.background]="turn.role === 'user' ? 'var(--accent)' : 'var(--surface)'"
          [style.color]="turn.role === 'user' ? 'var(--bg)' : 'var(--text)'"
        >
          <div class="mb-1 text-[10px] font-bold uppercase tracking-widest opacity-70">
            {{ turn.role }}
          </div>
          <app-markdown [source]="turn.content" class="md-content" />
        </div>
      </div>
    }
    <!-- Sentinel: the auto-scroll logic in the component scrolls this
         into view, which keeps the latest message + the input row above
         the fold. Without it, new turns push the input off-screen and
         the operator has to manually scroll to keep typing. -->
    <div #bottomSentinel aria-hidden="true"></div>
  </div>

  @if (error(); as e) {
    <div
      class="th-border mt-2 flex items-start justify-between gap-2 border-2 px-3 py-2 text-xs th-pulse"
      data-testid="chat-error"
      style="
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--danger) 10%, transparent);
      "
    >
      <span
        [style.color]="'var(--danger)'"
        class="flex-1 break-words"
      >
        {{ e }}
      </span>
      <button
        type="button"
        (click)="dismissError()"
        data-testid="chat-error-dismiss"
        aria-label="Dismiss error"
        class="th-border border-2 px-1.5 text-[10px] font-bold uppercase tracking-widest"
        style="border-radius: var(--radius); color: var(--text); background: var(--surface)"
      >
        ✕
      </button>
    </div>
  }

  <form (ngSubmit)="send()" class="mt-3 flex flex-shrink-0 items-end gap-2" data-testid="chat-form">
    <textarea
      #inputBox
      [ngModel]="inputValue()"
      (ngModelChange)="onInput($event)"
      (keydown)="onKeydown($event)"
      name="chat-input"
      [disabled]="busy()"
      autocomplete="off"
      rows="1"
      placeholder="Ask {{ peerId }} anything...  (Enter to send, Shift+Enter for newline)"
      class="th-surface th-border block w-full resize-none border-2 px-3 py-2 text-sm leading-snug outline-none"
      style="border-radius: var(--radius); color: var(--text); min-height: 2.5rem; max-height: 12rem"
      data-testid="chat-input"
    ></textarea>
    <button
      type="submit"
      [disabled]="!canSend()"
      class="th-border flex-shrink-0 border-2 px-4 py-2 text-sm font-bold uppercase tracking-widest th-gradient"
      style="border-radius: var(--radius); color: var(--bg)"
    >
      @if (busy()) {
        <span class="th-display">...</span>
      } @else {
        Send
      }
    </button>
  </form>
</div>
