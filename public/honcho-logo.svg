<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Dynamic theme-aware gradients -->
    <linearGradient id="honchoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent, #ff2d95)" />
      <stop offset="50%" stop-color="var(--accent-2, #ffe600)" />
      <stop offset="100%" stop-color="var(--accent-3, #00f0ff)" />
    </linearGradient>
  </defs>

  <!-- Neural pathways (drawn behind the main monogram for a seamless blend) -->
  <g stroke="url(#honchoGrad)" stroke-linecap="round" fill="none">
    <!-- Top-left pathway -->
    <path d="M 31,32 L 16,17" stroke-width="3" />
    
    <!-- Bottom-right pathway -->
    <path d="M 69,68 L 84,83" stroke-width="3" />
  </g>

  <!-- Connection terminals (neural dots) -->
  <g fill="url(#honchoGrad)">
    <circle cx="16" cy="17" r="4" />
    <circle cx="84" cy="83" r="4" />
  </g>

  <!-- Stylized Geometric "H" Monogram -->
  <path 
    d="M 31,28 L 31,80 M 31,54 L 69,46 M 69,20 L 69,72" 
    stroke="url(#honchoGrad)" 
    stroke-width="14" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
  />
</svg>
